services:
  - type: web
    name: fixforward-api
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: "pip install -r backend/requirements.txt && cd backend && python seed.py"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: SECRET_KEY
        value: SCCIN_SUPER_SECRET_KEY
